# ════════════════════════════════════════════════════════════════════
#  HPKI電子署名ツール — リリース自動化
# ════════════════════════════════════════════════════════════════════
#
# トリガー: v1.2.3 のような tag を push したとき
#   git tag v1.2.3 && git push --tags
#
# 動作:
#   1. Windows runner で全ビルド実行 (launcher / payload / installer)
#   2. GitHub Release を作成し、生成物をアップロード

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン番号（例: 1.2.3）'
        required: true
        default: '1.1.0'

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write   # Release 作成に必要

    steps:
      - name: ソースをチェックアウト
        uses: actions/checkout@v4

      - name: バージョン番号を決定
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $v = '${{ github.event.inputs.version }}'
          } else {
            $v = '${{ github.ref_name }}' -replace '^v',''
          }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Go セットアップ
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Inno Setup インストール
        run: |
          choco install innosetup -y --no-progress
        shell: pwsh

      - name: 全部ビルド
        run: |
          .\scripts\build_all.ps1 -Version "${{ steps.version.outputs.VERSION }}"
        shell: pwsh

      - name: SHA256 ハッシュを生成（自動更新の検証用）
        id: hashes
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          # build_payload.ps1 が出力するファイル名（v プレフィックスなし）
          $payload = "build/payload-$v.zip"
          $installer = "build/hpki-signer-setup-$v.exe"

          # payload の SHA256 を生成（bridge.py が更新適用前に検証する）
          if (Test-Path $payload) {
              $h = (Get-FileHash -Algorithm SHA256 $payload).Hash.ToLower()
              "$h  payload-$v.zip" | Set-Content "$payload.sha256" -Encoding ASCII
              Write-Host "payload SHA256: $h"
              echo "PAYLOAD_SHA256=$h" >> $env:GITHUB_OUTPUT
          }

          # installer の SHA256 も生成（手動検証用）
          if (Test-Path $installer) {
              $h = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLower()
              "$h  hpki-signer-setup-$v.exe" | Set-Content "$installer.sha256" -Encoding ASCII
              Write-Host "installer SHA256: $h"
              echo "INSTALLER_SHA256=$h" >> $env:GITHUB_OUTPUT
          }

      - name: GitHub Release を作成
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "HPKI電子署名ツール v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🎉 v${{ steps.version.outputs.VERSION }}

            ### ダウンロード
            - **新規インストール**: `hpki-signer-setup-${{ steps.version.outputs.VERSION }}.exe`
            - **手動更新（既存ユーザー）**: `payload-v${{ steps.version.outputs.VERSION }}.zip`

            ### SHA256 ハッシュ（整合性検証用）
            ```
            installer: ${{ steps.hashes.outputs.INSTALLER_SHA256 }}
            payload:   ${{ steps.hashes.outputs.PAYLOAD_SHA256 }}
            ```

            > 自動更新では payload の SHA256 をダウンロード前後で検証します。
            > 一致しない場合は適用されません（改ざん検知）。

            ### 動作環境
            - Windows 10 / 11 (64bit)
            - **Google Chrome または Microsoft Edge（最新版）** ※ Firefox / Safari 非対応
            - HPKIカードリーダー または マイナンバーカード対応カードリーダー
            - Adobe Acrobat Reader（署名検証用）

            ### インストール方法
            1. `hpki-signer-setup-${{ steps.version.outputs.VERSION }}.exe` をダウンロード
            2. ダブルクリックで起動
            3. ウィザードに従ってインストール

            ※ Windows SmartScreen で「保護されました」と出た場合は「詳細情報」→「実行」を押してください。
          draft: false
          prerelease: false
          files: |
            build/hpki-signer-setup-${{ steps.version.outputs.VERSION }}.exe
            build/hpki-signer-setup-${{ steps.version.outputs.VERSION }}.exe.sha256
            build/payload-${{ steps.version.outputs.VERSION }}.zip
            build/payload-${{ steps.version.outputs.VERSION }}.zip.sha256

      - name: 成果物をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: hpki-signer-${{ steps.version.outputs.VERSION }}
          path: |
            build/*.exe
            build/*.zip
          if-no-files-found: error
